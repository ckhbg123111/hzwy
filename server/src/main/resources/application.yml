spring:
  application:
    name: boardgame-platform-server
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8079

logging:
  file:
    name: logs/boardgame-platform-server.log
  level:
    root: INFO
    com.boardgame.platform: INFO
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n%wEx"
  logback:
    rollingpolicy:
      file-name-pattern: logs/boardgame-platform-server.%d{yyyy-MM-dd}.%i.log
      max-file-size: 10MB
      max-history: 14
      total-size-cap: 500MB

boardgame:
  ops-token: dev-ops-token
